<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBED</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-deco deco1"></div>
  <div class="bg-deco deco2"></div>
  <div class="bg-deco deco3"></div>

  <div class="container">
    <h1>FBED</h1>
    <p class="subtitle">朝から夜までのやること</p>

    <section class="now-card">
      <div class="now-label">今やること</div>
      <div id="nowTask" class="now-task">まだありません</div>
      <div id="nowCategory" class="now-category"></div>
      <button id="completeNowBtn" class="complete-now-btn" onclick="completeNowTask()">完了</button>
    </section>

    <h2>朝のスタート</h2>
    <div class="check-list">
      <label class="check-item">
        <input type="checkbox" class="morning-check">
        <span>ベッドから起きる</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="morning-check">
        <span>カーテンを開ける</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="morning-check">
        <span>水を飲む</span>
      </label>
    </div>

    <h2>今日やること</h2>

    <div class="task-row">
      <input id="taskInput" type="text" placeholder="やることを書く">
      <button onclick="addTask()">追加</button>
    </div>

    <div class="quick-buttons">
      <button class="quick-btn" onclick="quickAdd('問題集')">問題集</button>
      <button class="quick-btn" onclick="quickAdd('宿題')">宿題</button>
      <button class="quick-btn" onclick="quickAdd('スタサプ')">スタサプ</button>
      <button class="quick-btn" onclick="quickAdd('英会話')">英会話</button>
      <button class="quick-btn" onclick="quickAdd('読書')">読書</button>
      <button class="quick-btn" onclick="quickAdd('日記を書く')">日記</button>
      <button class="quick-btn" onclick="quickAdd('学校')">学校</button>
      <button class="quick-btn" onclick="quickAdd('塾')">塾</button>
      <button class="quick-btn" onclick="quickAdd('進路')">進路</button>
      <button class="quick-btn" onclick="quickAdd('朝食')">朝食</button>
      <button class="quick-btn" onclick="quickAdd('歯磨き')">歯磨き</button>
      <button class="quick-btn" onclick="quickAdd('運動')">運動</button>
    </div>

    <h3>いまやることリスト</h3>
    <div id="taskList" class="task-list"></div>

    <h3>できた！</h3>
    <ul id="doneList" class="done-list"></ul>

    <div class="status-box bottom-status">
      <p>のこりタスク: <span id="remainingCount">0</span></p>
      <p>できたタスク: <span id="doneCount">0</span></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
